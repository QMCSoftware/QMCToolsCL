name: release Windows sdist bdist_wheel
on:
  push:
    branches:
      - master 
      - main
      - release
  release:
    types:
      - created
jobs:
  PDM_build_Windows:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v2
    - name: Set up Python 3.x
      uses: actions/setup-python@v2
      with:
        python-version: '3.x'
    - name: Install dependencies
      shell: pwsh
      run: powershell -ExecutionPolicy ByPass -c "irm https://pdm-project.org/install.ps1 | iex"
    - name: Build wheels
      run: pdm build
    - uses: actions/upload-artifact@v4
      with:
        name: dist
        path: dist